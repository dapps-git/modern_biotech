<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Background gradient: deep navy to teal -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0B6E6E"/>
    </linearGradient>
    <!-- Helix strand gradient -->
    <linearGradient id="strand1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
    <linearGradient id="strand2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#4DD0E1"/>
    </linearGradient>
    <!-- Drop shine -->
    <radialGradient id="shine" cx="35%" cy="30%" r="45%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to water drop -->
    <clipPath id="dropClip">
      <path d="M16 2 C16 2 5 16 5 22.5 C5 28.3 10.1 31 16 31 C21.9 31 27 28.3 27 22.5 C27 16 16 2 16 2Z"/>
    </clipPath>
  </defs>

  <!-- Water drop background -->
  <path d="M16 2 C16 2 5 16 5 22.5 C5 28.3 10.1 31 16 31 C21.9 31 27 28.3 27 22.5 C27 16 16 2 16 2Z" fill="url(#bg)"/>

  <!-- DNA helix inside drop (clipped) -->
  <g clip-path="url(#dropClip)" filter="url(#glow)">
    <!-- Left strand (S-curve) -->
    <path d="M13 9 C11 13 14 16 12 20 C11 22 10 24 11 26"
          fill="none" stroke="url(#strand1)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Right strand (reverse S-curve) -->
    <path d="M19 9 C21 13 18 16 20 20 C21 22 22 24 21 26"
          fill="none" stroke="url(#strand2)" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Rungs of the helix -->
    <line x1="13" y1="11.5" x2="19" y2="11.5" stroke="#00E5FF" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
    <line x1="12.2" y1="14" x2="19.8" y2="14" stroke="#4DD0E1" stroke-width="0.9" stroke-linecap="round" opacity="0.75"/>
    <line x1="13" y1="16.5" x2="19" y2="16.5" stroke="#00E5FF" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
    <line x1="12" y1="19" x2="20" y2="19" stroke="#4DD0E1" stroke-width="0.9" stroke-linecap="round" opacity="0.75"/>
    <line x1="12.5" y1="21.5" x2="19.5" y2="21.5" stroke="#00E5FF" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
    <line x1="11.5" y1="24" x2="20.5" y2="24" stroke="#4DD0E1" stroke-width="0.9" stroke-linecap="round" opacity="0.70"/>

    <!-- Glowing nodes on left strand -->
    <circle cx="13" cy="11.5" r="1.1" fill="#00E5FF" opacity="0.9"/>
    <circle cx="12.2" cy="14" r="1.0" fill="#80DEEA" opacity="0.8"/>
    <circle cx="13" cy="16.5" r="1.1" fill="#00E5FF" opacity="0.9"/>
    <circle cx="12" cy="19" r="1.0" fill="#80DEEA" opacity="0.8"/>
    <circle cx="12.5" cy="21.5" r="1.1" fill="#00E5FF" opacity="0.9"/>
    <!-- Glowing nodes on right strand -->
    <circle cx="19" cy="11.5" r="1.1" fill="#00E5FF" opacity="0.9"/>
    <circle cx="19.8" cy="14" r="1.0" fill="#80DEEA" opacity="0.8"/>
    <circle cx="19" cy="16.5" r="1.1" fill="#00E5FF" opacity="0.9"/>
    <circle cx="20" cy="19" r="1.0" fill="#80DEEA" opacity="0.8"/>
    <circle cx="19.5" cy="21.5" r="1.1" fill="#00E5FF" opacity="0.9"/>
  </g>

  <!-- Shine overlay -->
  <path d="M16 2 C16 2 5 16 5 22.5 C5 28.3 10.1 31 16 31 C21.9 31 27 28.3 27 22.5 C27 16 16 2 16 2Z" fill="url(#shine)"/>
</svg>
